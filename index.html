  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

  .cta{transition:all .2s ease;cursor:pointer;border:none;font-family:inherit}

9":"Sukar bernafas, Sakit dada, Pengsan,\nPendarahan tidak terkawal, Sawan, Keadaan semakin teruk.\nKecemasan: Hubungi 999"}\n══════════════════════════════════════════════\nGenerated by ED HKL Pre-Triage System | Hospital Kuala Lumpur\n  Adapted from i-CEMAS (credit: JKN Melaka / KKM)\n══════════════════════════════════════════════`;
  const blob=new Blob([c],{type:"text/plain"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`iCEMAS_KK_${ref}.txt`;a.click();URL.revokeObjectURL(url);
};

function Dashboard({lang,onLogout}){
  const t=T[lang];
  const [cases,setCases]=useState(loadCases());
  const [fil,setFil]=useState("all");
  const [confirmDel,setConfirmDel]=useState(false);
  const today=new Date().toDateString();
  const shown=fil==="today"?cases.filter(c=>new Date(c.rawTime).toDateString()===today):cases;
  const edN=shown.filter(c=>c.outcome==="ED").length;
  const kkN=shown.filter(c=>c.outcome==="KK").length;

  const SC=(lbl,val,col,ico)=><div style={{background:`${col}0d`,border:`1.5px solid ${col}22`,borderRadius:14,padding:"12px",textAlign:"center"}}><div style={{fontSize:20,marginBottom:2}}>{ico}</div><div style={{fontSize:24,fontWeight:900,color:col,fontFamily:"monospace"}}>{val}</div><div style={{fontSize:10,color:"#64748b",fontWeight:600,marginTop:2}}>{lbl}</div></div>;
  return<div style={{animation:"fadeUp .4s ease"}}>

      <button onClick={onLogout} style={{background:"#fef2f2",border:"1px solid #fecaca",color:"#dc2626",borderRadius:10,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{t.logout}</button>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>{SC(t.dTotal,shown.length,"#0284c7","📋")}{SC(t.dED,edN,"#ef4444","🚨")}{SC(t.dKK,kkN,"#10b981","✅")}</div>

      <button onClick={doClear} style={{flex:1,padding:"10px",borderRadius:10,border:`1px solid ${confirmDel?"#ef4444":"#e2e8f0"}`,background:confirmDel?"#fef2f2":"#f8fafc",color:confirmDel?"#dc2626":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer"}}>🗑 {confirmDel?t.dConfirm:t.dClear}</button>
    </div>
    {shown.length===0?<div style={{textAlign:"center",padding:"36px 20px",color:"#94a3b8"}}><div style={{fontSize:36,marginBottom:8}}>📭</div><p>{t.dNoData}</p></div>:
    <div style={{display:"flex",flexDirection:"column",gap:8}}>{[...shown].reverse().map((c,i)=><div key={i} style={{background:c.outcome==="ED"?"#fef2f2":"#f0fdf4",border:`1px solid ${c.outcome==="ED"?"#fecaca":"#bbf7d0"}`,borderRadius:12,padding:"12px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontWeight:800,fontSize:13,color:c.outcome==="ED"?"#dc2626":"#059669"}}>{c.outcome==="ED"?"🚨":"✅"} {c.outcome} {c.outcome==="KK"?`· ${c.ref}`:""}</span><span style={{fontSize:10,color:"#94a3b8",fontFamily:"monospace"}}>{c.time?.slice(0,17)}</span></div>
      <p style={{fontSize:13,fontWeight:700,color:"#1e293b",margin:"0 0 2px"}}>{c.name} <span style={{fontWeight:400,color:"#64748b",fontSize:12}}>({c.gender}, {c.age!=="-"?`${c.age}y`:"-"})</span></p>
      <p style={{fontSize:12,color:"#64748b",margin:"0 0 2px",fontFamily:"monospace"}}>IC: {c.ic} · 📞 {c.phone}</p>
      <p style={{fontSize:11,color:"#94a3b8",margin:0}}>{c.arrival} · {c.reason}</p>
    </div>)}</div>}
  </div>;
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [lang,setLang]=useState("en");
  const [sc,setSc]=useState("welcome");
  const [pdpaOk,setPdpaOk]=useState(false);
  const [stepId,setStepId]=useState("service_type");
  const [ans,setAns]=useState({});
  const [multi,setMulti]=useState([]);
  const [hist,setHist]=useState([]);
  const [q,setQ]=useState(null);
  const [ref,setRef]=useState(null);
  const [edR,setEdR]=useState("");
  const [kkR,setKkR]=useState("");
  const [errs,setErrs]=useState({});
  const [pin,setPin]=useState("");
  const [pinErr,setPinErr]=useState(false);
  const [pt,setPt]=useState({name:"",ic:"",phone:"",dob:"",gender:"",arrival:"",address:"",docType:"ic"});
  const P=(k,v)=>setPt(p=>({...p,[k]:v}));

  const t=T[lang];
  const STEPS=getSteps(lang);
  const si=STEPS.findIndex(s=>s.id===stepId);
  const step=STEPS.find(s=>s.id===stepId);
  const secCols={"Service":"#8b5cf6","Patient Info":"#0284c7","Medical History":"#f59e0b","Clinical Assessment":"#ef4444","Additional":"#0891b2"};
  const secCol=secCols[step?.sec]||"#0284c7";
  const secLbl=t.secs[step?.sec]||step?.sec||"";

  const validIC=ic=>ic.trim().length>=6;
  const isMalaysianIC=ic=>{const d=ic.replace(/[^0-9]/g,"");return d.length===12&&parseInt(d.slice(2,4))>=1&&parseInt(d.slice(2,4))<=12&&parseInt(d.slice(4,6))>=1&&parseInt(d.slice(4,6))<=31;};
  const parseDOBfromIC=ic=>{
    const digits=ic.replace(/[^0-9]/g,"");
    if(digits.length!==12) return "";
    const yy=digits.slice(0,2), mm=digits.slice(2,4), dd=digits.slice(4,6);
    const mmN=parseInt(mm), ddN=parseInt(dd);
    if(mmN<1||mmN>12||ddN<1||ddN>31) return "";
    const currentYY=parseInt(new Date().getFullYear().toString().slice(2));
    const yyyy=parseInt(yy)>currentYY?"19":"20";
    return yyyy+yy+"-"+mm+"-"+dd;
  };

  const doRegNext=()=>{
    const e={};
    if(!pt.name.trim())e.name=lang==="en"?"Name is required":"Nama diperlukan";
    if(!pt.ic.trim())e.ic=lang==="en"?"IC / Passport number required":"No. IC / Pasport diperlukan";
    else if(!validIC(pt.ic))e.ic=t.icErr;
    if(!pt.phone.trim())e.phone=lang==="en"?"Contact required":"Nombor telefon diperlukan";
    if(!pt.gender)e.gender=lang==="en"?"Select gender":"Sila pilih jantina";
    if(Object.keys(e).length){setErrs(e);return;}
    setErrs({});setSc("questions");
  };

  const rec=(outcome,extra={})=>{
    const now=new Date();
    const outcomeLabel = outcome==="KK"
      ? "STABLE — Suitable for Redirection to Klinik Kesihatan"
      : "REQUIRES EMERGENCY DEPARTMENT";
    const triageCategory = outcome==="KK" ? "GREEN (Stable / Non-Urgent)" : "RED / YELLOW (Emergency)";
    const caseData={rawTime:now.toISOString(),time:`${fmtDate(now)} ${fmtTime(now)}`,
      name:pt.name,ic:pt.ic,phone:pt.phone,gender:pt.gender,age:calcAge(pt.dob),
      arrival:pt.arrival||"-",address:pt.address,pdpa:"Yes",
      outcome, outcomeLabel, triageCategory,
      comorbid:Array.isArray(ans.comorbid_list)?ans.comorbid_list.join(", "):"-",
      allergy:ans.allergy||"-",duration:ans.duration||"-",prior:ans.prior||"-",
      serviceType:ans.service_type||"-",pain:ans.pain||"-",mobility:ans.mobility||"-",
      fever:ans.fever||"-",vomiting:ans.vomiting||"-",pregnancy:ans.pregnant||"-",
      ...extra};
    addCase(caseData);
    // Submit to Google Sheets via form POST (works with no-cors)
    const form=document.createElement("form");
    form.method="POST"; form.action=GS_URL; form.target="gs_iframe"; form.style.display="none";
    const inp=document.createElement("input"); inp.type="hidden"; inp.name="data";
    inp.value=JSON.stringify({...caseData,timestamp:caseData.time});
    form.appendChild(inp);
    let iframe=document.getElementById("gs_iframe");
    if(!iframe){iframe=document.createElement("iframe");iframe.name="gs_iframe";iframe.id="gs_iframe";iframe.style.display="none";document.body.appendChild(iframe);}
    document.body.appendChild(form); form.submit(); 
    setTimeout(()=>{document.body.removeChild(form);},3000);
  };

  const goED=r=>{setEdR(r);rec("ED",{ref:`ED-${new Date().toISOString().slice(0,19).replace('T',' ')}`,reason:r});setSc("ed");};
  const goKK=r=>{const rf=genRef();setRef(rf);setKkR(r||t.kkDef);rec("KK",{ref:rf,reason:r||t.kkDef});setSc("kk");};

  const doSingle=o=>{
    setAns({...ans,[step.id]:o.val});setHist([...hist,stepId]);
    if(o.ed)return goED(o.edR);
    if(o.kk)return goKK(o.kkR);
    if(o.next==="result")return goKK(t.kkDef);
    if(o.next)setStepId(o.next);
  };
  const doMulti=()=>{
    if(!multi.length)return;
    setAns({...ans,[step.id]:multi});setHist([...hist,stepId]);setMulti([]);
    if(step.next==="result")return goKK(t.kkDef);
    if(step.next)setStepId(step.next);
  };
  const goBack=()=>{
    if(sc==="questions"&&!hist.length){setSc("register");return;}
    if(!hist.length)return;
    const prev=hist[hist.length-1];setHist(hist.slice(0,-1));setStepId(prev);setMulti([]);
  };
  const restart=()=>{setSc("welcome");setStepId("service_type");setAns({});setMulti([]);setHist([]);setQ(null);setRef(null);setEdR("");setKkR("");setPdpaOk(false);setErrs({});setPt({name:"",ic:"",phone:"",dob:"",gender:"",arrival:"",address:"",docType:"ic"});};
